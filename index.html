<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كيدي تحبيني لو لا؟ ❤️</title>

<style>
body{
    margin:0;
    font-family:Tahoma,sans-serif;
    background:#ffd6e7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    background:white;
    padding:25px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
    width:320px;
}

img{
    width:180px;
    border-radius:15px;
}

h2{
    color:#ff4f8b;
    margin:15px 0;
}

button{
    padding:12px 24px;
    border:none;
    border-radius:20px;
    font-size:18px;
    cursor:pointer;
}

#yes{
    background:#ff4f8b;
    color:white;
}

#no{
    background:#ddd;
    position:absolute;
}

#result{
    margin-top:20px;
    font-size:26px;
    color:#ff4f8b;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<img src="https://placekitten.com/300/300" alt="cat">

<h2>كيدي تحبيني لو لا؟ ❤️</h2>

<button id="yes">إي ❤️</button>
<button id="no">لا</button>

<div id="result"></div>

</div>

<script>

const noBtn = document.getElementById("no");

function moveButton(){
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

document.getElementById("yes").onclick = () => {
    document.getElementById("result").innerHTML =
    "كنت أدري 😍❤️";
};

</script>

</body>
</html>
